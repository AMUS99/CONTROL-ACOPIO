<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico de conexión</title>
<style>
  body { font-family: monospace; background:#111; color:#eee; padding:20px; font-size:14px; line-height:1.6; }
  button { display:block; width:100%; padding:14px; margin:10px 0; font-size:15px; border:none; border-radius:8px; background:#2563eb; color:#fff; }
  pre { background:#000; padding:12px; border-radius:8px; white-space:pre-wrap; word-break:break-all; max-height:300px; overflow:auto; }
  .ok { color:#4ade80; } .err { color:#f87171; }
</style>
</head>
<body>
  <h2>🔬 Diagnóstico de conexión</h2>
  <p>Esta página NO es tu formulario — es solo para probar la conexión a Apps Script de forma aislada.</p>

  <button onclick="probarGET()">1. Probar GET (leer datos)</button>
  <button onclick="probarPOSTsimple()">2. Probar POST simple</button>
  <button onclick="probarPOSTnocors()">3. Probar POST no-cors</button>

  <pre id="resultado">Esperando prueba...</pre>

  <script>
    const SHEET_URL = "https://script.google.com/macros/s/AKfycbzXyQy8q8Dwftzbcyd7wIjLhx3Y3dNqfBQeaCChBugduMzcXjTEz6-REgXZ9u3dmpewTQ/exec";
    const out = document.getElementById('resultado');

    function log(msg, isError) {
      out.innerHTML = `<span class="${isError ? 'err' : 'ok'}">${msg}</span>`;
    }

    async function probarGET() {
      log('Probando GET...');
      try {
        const resp = await fetch(SHEET_URL);
        const text = await resp.text();
        log('✅ GET funcionó.\nStatus: ' + resp.status + '\nPrimeros 200 caracteres:\n' + text.slice(0,200));
      } catch (e) {
        log('❌ GET falló: ' + (e.message || e.toString()), true);
      }
    }

    async function probarPOSTsimple() {
      log('Probando POST simple (modo cors, sin headers)...');
      try {
        const resp = await fetch(SHEET_URL, {
          method: 'POST',
          body: JSON.stringify({ actividad: 'diagnostico', ref: 'DIAG-' + Date.now() })
        });
        const text = await resp.text();
        log('✅ POST simple funcionó.\nStatus: ' + resp.status + '\nRespuesta:\n' + text.slice(0,200));
      } catch (e) {
        log('❌ POST simple falló: ' + (e.message || e.toString()), true);
      }
    }

    async function probarPOSTnocors() {
      log('Probando POST en modo no-cors...');
      try {
        await fetch(SHEET_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({ actividad: 'diagnostico', ref: 'DIAG-NOCORS-' + Date.now() })
        });
        log('✅ POST no-cors se disparó sin lanzar excepción (no podemos leer la respuesta, pero no falló de inmediato).');
      } catch (e) {
        log('❌ Incluso POST no-cors falló: ' + (e.message || e.toString()), true);
      }
    }
  </script>
</body>
</html>
